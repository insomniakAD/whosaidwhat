# The Mac toolchain pipeline for code authored in a no-crates.io sandbox.
# Independent jobs, cheapest signal first:
#   core    — type-check + test the macOS FFI surface (objc2*, cpal,
#             screencapturekit, coreaudio-sys) without the heavy native deps
#   shell   — Tauri v2 codegen + shell binary type-check
#   full    — default features: whisper.cpp (Metal) + sherpa-onnx native
#             builds, then the whole test suite
#   bundle  — tauri build (default features + shell): the .app and .dmg,
#             uploaded as artifacts (ad-hoc signed; no signing identity)
#   harness — the bare-rustc pure-core tests, on Linux where crate-free
#             compilation is possible
name: mac-build

on:
  push:
    branches: [claude/mac-toolchain-build-xjyk72, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

defaults:
  run:
    working-directory: src-tauri

jobs:
  core:
    name: core check + test (no default features)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: core
      - name: cargo check (all targets)
        run: cargo check --no-default-features --all-targets
      - name: cargo test
        run: cargo test --no-default-features
      - name: upload lockfile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Cargo.lock-core
          path: src-tauri/Cargo.lock
          if-no-files-found: ignore

  # The bare-rustc harness compiles src files with no crates, relying on
  # cfg(target_os = "macos") to strip the FFI surface — so it only builds on
  # a non-mac host. Linux is where it was authored and where it stays.
  harness:
    name: bare-rustc harness (pure core, linux)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: run harness
        run: rustc --edition 2021 --test harness/harness.rs -o /tmp/wsw-harness && /tmp/wsw-harness

  shell:
    name: tauri shell check
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: shell
      - name: cargo check --features shell
        run: cargo check --no-default-features --features shell --bin whosaidwhat-app

  full:
    name: full build + test (whisper + sherpa)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: full
          # sherpa-rs-sys downloads its prebuilt sherpa-onnx libs here; a
          # restored target/ marks the build script fresh while this dir is
          # gone on a new runner, so the linker finds no onnxruntime.
          cache-directories: ~/Library/Caches/sherpa-rs
      - name: re-run sherpa-rs-sys build script
        # Its OUT_DIR libs don't survive the cache round-trip; cleaning just
        # this package forces the (cheap, cached-download) script to restage
        # them without invalidating the rest of the target dir.
        run: cargo clean -p sherpa-rs-sys
      - name: tool versions
        run: |
          rustc -V && cargo -V && cmake --version | head -1
          xcodebuild -version || true
      - name: cargo build (default features)
        run: cargo build
      - name: cargo test (default features)
        run: cargo test

  bundle:
    name: tauri bundle (.app + .dmg)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: bundle
          # Same cache hazard as the full job (see above).
          cache-directories: ~/Library/Caches/sherpa-rs
      - name: re-run sherpa-rs-sys build script
        run: cargo clean -p sherpa-rs-sys
      - name: install tauri CLI
        run: npm install -g @tauri-apps/cli
      - name: cargo build (release, shell)
        # Compile before bundling so sherpa-rs-sys has downloaded its shared
        # dylibs; tauri build below reuses this target dir and only bundles.
        run: cargo build --release --features shell --bin whosaidwhat-app
      - name: stage sherpa dylibs for embedding
        # The app links onnxruntime/sherpa-onnx-c-api as @rpath dylibs that
        # live in the sherpa-rs download cache — useless on a user's machine.
        # Stage them and hand tauri a config overlay so they're copied into
        # Contents/Frameworks (the binary carries the matching rpath, see
        # build.rs).
        run: |
          mkdir -p frameworks
          cp -L ~/Library/Caches/sherpa-rs/*/*/*/lib/*.dylib frameworks/ 2>/dev/null \
            || cp -L ~/Library/Caches/sherpa-rs/*/*/lib/*.dylib frameworks/
          ls -la frameworks/
          printf '{"bundle":{"macOS":{"frameworks":[%s]}}}' \
            "$(ls frameworks/*.dylib | sed 's|.*|"&"|' | paste -sd, -)" > /tmp/frameworks.json
          cat /tmp/frameworks.json
      - name: tauri build
        run: tauri build --features shell --config /tmp/frameworks.json
      - name: package .app
        # tar preserves the bundle's exec bits and symlinks; upload-artifact's
        # own zip step does not.
        run: tar -czf whosaidwhat-app.tar.gz -C target/release/bundle/macos whosaidwhat.app
      - name: upload .app
        uses: actions/upload-artifact@v4
        with:
          name: whosaidwhat-app
          path: src-tauri/whosaidwhat-app.tar.gz
      - name: upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: whosaidwhat-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
